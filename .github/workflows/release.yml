name: Release

# Tag-triggered lockstep publish: every public package shares one version.
# Cut a release locally, then push the tag:
#
#   pnpm -r exec npm version X.Y.Z --no-git-tag-version   # bump workspace packages
#   npm version X.Y.Z --no-git-tag-version --allow-same-version  # bump root too
#   git commit -am "release: vX.Y.Z"
#   git tag vX.Y.Z && git push --follow-tags
#
# The tag must equal the version in every package.json (root included) or the
# workflow's verify step aborts before publishing.
#
# Pushing a v* tag runs this workflow: verify the tag matches every package.json
# version, run the full gate, publish every package under `next`, verify the exact
# registry artifacts as clean consumers, then move `latest`. A failed verification
# leaves the previous `latest` untouched. Publishing needs npm trusted publishing
# or the NPM_TOKEN secret; without either, the stage step fails safely.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  id-token: write # npm provenance (trusted publishing)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      # check:full exercises Bun shebang execution and the standalone example.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # check:full runs //#spell (typos), which has no npm build; pin the binary
      # like CI does so the release gate matches the PR gate exactly.
      - uses: taiki-e/install-action@v2
        with:
          tool: typos@1.48.0

      - run: pnpm install --frozen-lockfile

      # Guard the lockstep invariant: the pushed tag must equal the version every
      # package.json carries. Without this, tag v0.2.0 over unbumped manifests would
      # silently (re)publish 0.1.0. Skipped on workflow_dispatch (no tag ref).
      - name: Verify tag matches package versions
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          mismatch=0
          while IFS= read -r pkg; do
            v="$(node -p "require('./$pkg').version")"
            if [ "$v" != "$tag" ]; then
              echo "::error file=$pkg::$pkg is $v, expected $tag (tag $GITHUB_REF_NAME)"
              mismatch=1
            fi
          done < <(git ls-files 'package.json' 'packages/*/package.json')
          [ "$mismatch" = 0 ] || exit 1

      # Full gate, identical to PR CI (build + typecheck + lint + tests + audit +
      # docs + api). A tag pushed directly, bypassing a PR, is still fully vetted.
      - run: pnpm run check:full

      # Publish dependency-first under `next`; ordinary installs still receive the
      # previous `latest` if this job stops or registry verification fails.
      - name: Stage packages under next
        run: pnpm run release:stage
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # This installs from npm with default audit behavior, adds another dependency,
      # compiles a strict consumer with skipLibCheck=false, runs the fake backend,
      # and exercises a global CLI install before changing `latest`.
      - name: Verify registry artifacts and promote latest
        run: pnpm run release:promote
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
