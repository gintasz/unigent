name: Release

# Changesets release flow. On every push to main the action opens/updates a
# "Version Packages" PR that accumulates pending changesets; merging that PR (or a
# manual workflow_dispatch with no pending changesets) publishes — and ONLY the
# packages a changeset bumped, plus internal dependents whose dependency range moved.
#
# Auth supports both modes in one workflow:
#   - Trusted Publishing (OIDC): `id-token: write` + provenance. Engages automatically
#     once a trusted publisher is configured per package on npmjs.com (no secret).
#   - NPM_TOKEN: classic granular automation token in repo secrets — the active path
#     until/unless OIDC is configured. Provenance is emitted either way.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm run test

      # Guard publishing on NPM_TOKEN presence. Without it, changeset publish
      # fails with ENEEDAUTH on every push. When the secret is absent we leave
      # `publish` empty so the action only opens/updates the version PR (needs
      # GITHUB_TOKEN only); once the token is configured, publishing resumes.
      - id: npm_auth
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN not set — skipping publish, version PR only."
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release PR or publish changed packages
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: ${{ steps.npm_auth.outputs.present == 'true' && 'pnpm run release' || '' }}
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
