name: Release

# Tag-triggered lockstep publish: every public package shares one version.
# Cut a release locally, then push the tag:
#
#   pnpm -r exec npm version X.Y.Z --no-git-tag-version   # bump all packages
#   git commit -am "release: vX.Y.Z"
#   git tag vX.Y.Z && git push --follow-tags
#
# Pushing a v* tag runs this workflow: build, test, then publish every non-private
# package at its package.json version. `pnpm publish` skips any version already on
# npm, so re-running a tag is safe. Publishing needs the NPM_TOKEN secret; without
# it the publish step fails (an ordinary tag can't leak a release without auth).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  id-token: write # npm provenance (trusted publishing)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test

      # `release` = build + copy README/LICENSE into each package + pnpm -r publish
      # (+ cleanup). Idempotent: versions already on npm are skipped.
      - run: pnpm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
