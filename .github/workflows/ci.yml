name: CI

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      # typos has no npm build, so put the pinned binary on PATH for check:full's
      # //#spell task (the local pre-push gate uses a dev-installed typos).
      - uses: taiki-e/install-action@v2
        with:
          tool: typos@1.48.0
      - run: pnpm install --frozen-lockfile
      # Single source of truth: the exact gate the pre-push hook runs (lefthook →
      # check:full). Enumerating the tasks here let CI drift from it (it was missing
      # audit/docs:check/api:check). One command, no drift.
      - run: pnpm run check:full
      # e2e (real-LLM) runs separately; it skips, not fails, on provider/auth
      # errors (Q2) and needs model credentials, so it is not a merge gate here.
