# Definition-of-Done gate run locally (V1/DOD). Mirrors CI so red never reaches
# the remote.
pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,js,json}"
      run: corepack pnpm exec biome check --write --error-on-warnings --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      run: corepack pnpm run typecheck
    lint:types:
      run: corepack pnpm run lint:types
    # Whole-repo (like typecheck/lint:types above) and via the same `spell` script
    # `check` runs — so the hook and `check` cover an identical file set and cannot
    # drift. cspell over the repo is ~2s; staged-only is not worth a divergence risk.
    spell:
      run: corepack pnpm run spell

pre-push:
  parallel: false
  commands:
    arch:
      run: corepack pnpm run arch
    deps:
      run: corepack pnpm run deps:check
    dead:
      run: corepack pnpm run dead
    test:
      run: corepack pnpm run test
